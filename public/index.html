<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
      --card-text: #333;
      --card-muted: #666;
      --card-border: rgba(255, 255, 255, 0.2);
      --time-gradient: linear-gradient(135deg, #667eea, #764ba2);
      --forecast-bg: #fff;
      --forecast-border: #f0f0f0;
      --forecast-text: #333;
      --forecast-muted: #555;
      --weather-temp: #555;
      --weather-desc: #888;
      --toggle-bg: rgba(255, 255, 255, 0.2);
      --toggle-hover: rgba(255, 255, 255, 0.35);
      --toggle-text: #fff;
      --hero-gradient: linear-gradient(90deg, #fff, #ffd6e7);
      --hero-subtitle: rgba(255, 255, 255, 0.85);
      --shadow-color: rgba(0, 0, 0, 0.2);
    }
    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      --card-bg: rgba(30, 30, 50, 0.9);
      --card-text: #e8e8f0;
      --card-muted: #a0a0b0;
      --card-border: rgba(255, 255, 255, 0.08);
      --time-gradient: linear-gradient(135deg, #a78bfa, #f472b6);
      --forecast-bg: #1e1e32;
      --forecast-border: #2d2d4a;
      --forecast-text: #e8e8f0;
      --forecast-muted: #b0b0c0;
      --weather-temp: #c0c0d0;
      --weather-desc: #8888a0;
      --toggle-bg: rgba(255, 255, 255, 0.1);
      --toggle-hover: rgba(255, 255, 255, 0.2);
      --toggle-text: #ffd700;
      --hero-gradient: linear-gradient(90deg, #e0e0ff, #c4b5fd);
      --hero-subtitle: rgba(255, 255, 255, 0.7);
      --shadow-color: rgba(0, 0, 0, 0.5);
    }
    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition: background 0.5s ease;
    }
    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      background: var(--toggle-bg);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 0.5rem 1rem;
      color: var(--toggle-text);
      font-size: 1.2rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .theme-toggle:hover {
      background: var(--toggle-hover);
      transform: scale(1.05);
    }
    .theme-toggle .label {
      font-size: 0.8rem;
      font-weight: 600;
    }
    .hero-title {
      font-weight: 800;
      background: var(--hero-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-subtitle {
      color: var(--hero-subtitle);
    }
    .card-modern {
      border: 1px solid var(--card-border);
      border-radius: 1rem;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card-modern:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px var(--shadow-color);
    }
    .card-time {
      background: var(--card-bg);
      color: var(--card-text);
    }
    .card-time:hover {
      background: var(--card-bg);
      filter: brightness(1.05);
    }
    .time-display {
      font-size: 2.5rem;
      font-weight: 700;
      background: var(--time-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .date-display {
      color: var(--card-muted);
      font-size: 1.1rem;
    }
    .badge-live {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .feature-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .country-flag {
      margin-bottom: 0.5rem;
    }
    .country-flag img {
      width: 48px;
      height: 36px;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .weather-current {
      font-size: 1.8rem;
      margin-top: 0.5rem;
    }
    .weather-temp {
      font-size: 0.9rem;
      color: var(--weather-temp);
      font-weight: 600;
    }
    .weather-desc {
      font-size: 0.75rem;
      color: var(--weather-desc);
    }
    .card-time {
      position: relative;
    }
    .card-time .card-title {
      color: var(--card-text) !important;
    }
    .card-time .text-muted {
      color: var(--card-muted) !important;
    }
    .card-time .text-dark {
      color: var(--card-text) !important;
    }
    .forecast-popout h6 {
      color: var(--forecast-text) !important;
    }
    .forecast-popout {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--forecast-bg);
      border-radius: 1rem;
      box-shadow: 0 10px 40px var(--shadow-color);
      padding: 1rem;
      z-index: 1000;
      min-width: 280px;
      margin-top: 10px;
    }
    .forecast-popout::after {
      content: '';
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-bottom-color: var(--forecast-bg);
    }
    .card-time:hover .forecast-popout {
      display: block;
    }
    .forecast-day {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--forecast-border);
      font-size: 0.8rem;
    }
    .forecast-day:last-child {
      border-bottom: none;
    }
    .forecast-day-name {
      width: 60px;
      font-weight: 600;
      color: var(--forecast-text);
    }
    .forecast-day-icon {
      font-size: 1.2rem;
    }
    .forecast-day-temp {
      color: var(--forecast-muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <i class="bi bi-sun-fill" id="themeIcon"></i>
    <span class="label" id="themeLabel">Light</span>
  </button>

  <div class="container py-5">
    <!-- Hero Section -->
    <div class="text-center mb-5 pt-4">
      <h1 class="display-2 hero-title mb-3">Hello World</h1>
    </div>

    <!-- Time Cards -->
    <div class="row g-4 justify-content-center mb-5">
      <div class="col-md-3">
        <div class="card card-modern card-time p-3 text-center h-100" data-city="aus">
          <div class="forecast-popout" id="aus-forecast"></div>
          <div class="card-body">
            <div class="country-flag"><img src="https://flagcdn.com/w80/au.png" alt="Australia flag"></div>
            <span class="badge bg-success badge-live mb-2"><i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>LIVE</span>
            <h5 class="card-title fw-bold text-dark mb-1">Australia</h5>
            <p class="small text-muted mb-2">Sydney</p>
            <p class="time-display mb-1" id="aus-time"></p>
            <p class="date-display mb-0" id="aus-date"></p>
            <div class="weather-current" id="aus-weather-icon"></div>
            <p class="weather-temp" id="aus-weather-temp"></p>
            <p class="weather-desc" id="aus-weather-desc"></p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-modern card-time p-3 text-center h-100" data-city="th">
          <div class="forecast-popout" id="th-forecast"></div>
          <div class="card-body">
            <div class="country-flag"><img src="https://flagcdn.com/w80/th.png" alt="Thailand flag"></div>
            <span class="badge bg-success badge-live mb-2"><i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>LIVE</span>
            <h5 class="card-title fw-bold text-dark mb-1">Thailand</h5>
            <p class="small text-muted mb-2">Bangkok</p>
            <p class="time-display mb-1" id="th-time"></p>
            <p class="date-display mb-0" id="th-date"></p>
            <div class="weather-current" id="th-weather-icon"></div>
            <p class="weather-temp" id="th-weather-temp"></p>
            <p class="weather-desc" id="th-weather-desc"></p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-modern card-time p-3 text-center h-100" data-city="jp">
          <div class="forecast-popout" id="jp-forecast"></div>
          <div class="card-body">
            <div class="country-flag"><img src="https://flagcdn.com/w80/jp.png" alt="Japan flag"></div>
            <span class="badge bg-success badge-live mb-2"><i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>LIVE</span>
            <h5 class="card-title fw-bold text-dark mb-1">Japan</h5>
            <p class="small text-muted mb-2">Tokyo</p>
            <p class="time-display mb-1" id="jp-time"></p>
            <p class="date-display mb-0" id="jp-date"></p>
            <div class="weather-current" id="jp-weather-icon"></div>
            <p class="weather-temp" id="jp-weather-temp"></p>
            <p class="weather-desc" id="jp-weather-desc"></p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-modern card-time p-3 text-center h-100" data-city="in">
          <div class="forecast-popout" id="in-forecast"></div>
          <div class="card-body">
            <div class="country-flag"><img src="https://flagcdn.com/w80/in.png" alt="India flag"></div>
            <span class="badge bg-success badge-live mb-2"><i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>LIVE</span>
            <h5 class="card-title fw-bold text-dark mb-1">India</h5>
            <p class="small text-muted mb-2">Kolkata</p>
            <p class="time-display mb-1" id="in-time"></p>
            <p class="date-display mb-0" id="in-date"></p>
            <div class="weather-current" id="in-weather-icon"></div>
            <p class="weather-temp" id="in-weather-temp"></p>
            <p class="weather-desc" id="in-weather-desc"></p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const clocks = [
      { id: 'aus', tz: 'Australia/Sydney', locale: 'en-AU', lat: -33.8688, lon: 151.2093 },
      { id: 'th', tz: 'Asia/Bangkok', locale: 'th-TH', lat: 13.7563, lon: 100.5018 },
      { id: 'jp', tz: 'Asia/Tokyo', locale: 'ja-JP', lat: 35.6762, lon: 139.6503 },
      { id: 'in', tz: 'Asia/Kolkata', locale: 'en-IN', lat: 22.5726, lon: 88.3639 }
    ];

    function updateClocks() {
      const now = new Date();
      clocks.forEach(({ id, tz, locale }) => {
        const timeOpts = { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        const dateOpts = { timeZone: tz, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById(`${id}-time`).textContent = now.toLocaleTimeString(locale, timeOpts);
        document.getElementById(`${id}-date`).textContent = now.toLocaleDateString(locale, dateOpts);
      });
    }
    updateClocks();
    setInterval(updateClocks, 1000);

    // Weather emoji mapping based on Azure Maps icon codes
    function getWeatherEmoji(iconCode) {
      const map = {
        1: 'вҳҖпёҸ', 2: 'рҹҢӨпёҸ', 3: 'вӣ…', 4: 'вӣ…', 5: 'рҹҢҘпёҸ', 6: 'вҳҒпёҸ',
        7: 'вҳҒпёҸ', 8: 'вҳҒпёҸ', 11: 'рҹҢ«пёҸ', 12: 'рҹҢ§пёҸ', 13: 'рҹҢҰпёҸ',
        14: 'рҹҢҰпёҸ', 15: 'вӣҲпёҸ', 16: 'вӣҲпёҸ', 17: 'рҹҢҰпёҸ', 18: 'рҹҢ§пёҸ',
        19: 'рҹҢЁпёҸ', 20: 'рҹҢЁпёҸ', 21: 'рҹҢЁпёҸ', 22: 'вқ„пёҸ', 23: 'вқ„пёҸ',
        24: 'рҹ§Ҡ', 25: 'рҹҢ§пёҸ', 26: 'рҹҢ§пёҸ', 29: 'рҹҢ§пёҸвқ„пёҸ', 30: 'рҹҘө',
        31: 'рҹҘ¶', 32: 'рҹ’Ё', 33: 'рҹҢҷ', 34: 'рҹҢҷ', 35: 'рҹҢҷвҳҒпёҸ',
        36: 'рҹҢҷвҳҒпёҸ', 37: 'рҹҢҷвҳҒпёҸ', 38: 'вҳҒпёҸ', 39: 'рҹҢ§пёҸ', 40: 'рҹҢ§пёҸ',
        41: 'вӣҲпёҸ', 42: 'вӣҲпёҸ', 43: 'рҹҢЁпёҸ', 44: 'рҹҢЁпёҸ'
      };
      return map[iconCode] || 'рҹҢЎпёҸ';
    }

    function getDayName(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en', { weekday: 'short' });
    }

    // Fetch weather for all cities
    async function loadWeather() {
      for (const city of clocks) {
        try {
          const res = await fetch(`/api/weather/${city.lat}/${city.lon}`);
          if (!res.ok) continue;
          const data = await res.json();
          const forecasts = data.forecasts;
          if (!forecasts || forecasts.length === 0) continue;

          // Current day weather
          const today = forecasts[0];
          const icon = getWeatherEmoji(today.day.iconCode);
          const tempMin = today.temperature.minimum.value;
          const tempMax = today.temperature.maximum.value;
          const desc = today.day.shortPhrase;

          document.getElementById(`${city.id}-weather-icon`).textContent = icon;
          document.getElementById(`${city.id}-weather-temp`).textContent = `${tempMin}В°C вҖ” ${tempMax}В°C`;
          document.getElementById(`${city.id}-weather-desc`).textContent = desc;

          // 7-day forecast popout
          let forecastHtml = '<h6 class="fw-bold text-dark mb-2" style="font-size:0.85rem;">5-Day Forecast</h6>';
          forecasts.forEach(day => {
            const dayName = getDayName(day.date);
            const emoji = getWeatherEmoji(day.day.iconCode);
            const min = day.temperature.minimum.value;
            const max = day.temperature.maximum.value;
            forecastHtml += `
              <div class="forecast-day">
                <span class="forecast-day-name">${dayName}</span>
                <span class="forecast-day-icon">${emoji}</span>
                <span class="forecast-day-temp">${min}В° / ${max}В°C</span>
              </div>`;
          });
          document.getElementById(`${city.id}-forecast`).innerHTML = forecastHtml;
        } catch (e) {
          console.error(`Weather fetch failed for ${city.id}`, e);
        }
      }
    }
    loadWeather();

    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const html = document.documentElement;

    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      if (theme === 'dark') {
        themeIcon.className = 'bi bi-moon-stars-fill';
        themeLabel.textContent = 'Dark';
      } else {
        themeIcon.className = 'bi bi-sun-fill';
        themeLabel.textContent = 'Light';
      }
    }

    // Load saved theme or default to light
    const savedTheme = localStorage.getItem('theme') || 'light';
    setTheme(savedTheme);

    themeToggle.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>
</html>
