# CI Pipeline - Continuous Integration
# Triggers: Called by main workflow or on pull requests
# Jobs: Build/Compile, Unit Test, Code Coverage, Security Scan

name: CI Pipeline

on:
  workflow_call:

jobs:
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: node -e "require('./index.js')" && echo "Build successful"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            .
            !node_modules
            !coverage
            !.git

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx jest --detectOpenHandles --forceExit
        env:
          AZURE_MAPS_KEY: ${{ secrets.AZURE_MAPS_KEY }}

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --detectOpenHandles --forceExit --coverage --coverageReporters=json-summary --coverageReporters=lcov
        env:
          AZURE_MAPS_KEY: ${{ secrets.AZURE_MAPS_KEY }}

      # - name: Generate coverage badge
      #   uses: jaywcjlove/coverage-badges-cli@v1
      #   with:
      #     source: coverage/coverage-summary.json
      #     output: coverage/badge.svg

      # - name: Upload coverage report
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: coverage-report
      #     path: coverage/

      # - name: Deploy coverage badge to GitHub Pages
      #   if: github.ref == 'refs/heads/main'
      #   uses: peaceiris/actions-gh-pages@v4
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir: ./coverage
      #     destination_dir: coverage

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit (JSON report)
        run: npm audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit-report.json
