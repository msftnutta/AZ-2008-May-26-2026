# CI Pipeline - Continuous Integration
# Triggers: Called by main workflow or on pull requests
# Jobs: Build/Compile, Unit Test, Code Coverage

name: CI Pipeline

on:
  workflow_call:

jobs:
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: node -e "require('./index.js')" && echo "Build successful"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            .
            !node_modules
            !coverage
            !.git

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx jest --detectOpenHandles --forceExit
        env:
          AZURE_MAPS_KEY: ${{ secrets.AZURE_MAPS_KEY }}

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --detectOpenHandles --forceExit --coverage
        env:
          AZURE_MAPS_KEY: ${{ secrets.AZURE_MAPS_KEY }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
